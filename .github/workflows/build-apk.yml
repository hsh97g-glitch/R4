name: R4_Final_Clean_Build
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create www directory and copy HTML
        run: |
          mkdir -p www
          if [ -f "index.html" ]; then
            cp index.html www/index.html
          else
            echo "<html><body><h1>R4 App</h1></body></html>" > www/index.html
          fi

      - name: Install Capacitor
        run: |
          npm init -y
          npm install @capacitor/core @capacitor/cli @capacitor/android --save
          npx cap init "R4App" "com.hussein.r4app" --web-dir www
          npx cap add android

      - name: Fix Gradle and build APK
        run: |
          cd android
          # تصحيح gradle.properties
          echo "org.gradle.jvmargs=-Xmx2048m -XX:MaxPermSize=512m" >> gradle.properties
          echo "android.useAndroidX=true" >> gradle.properties
          
          # تصحيح build.gradle
          sed -i 's/sourceCompatibility = JavaVersion.VERSION_21/sourceCompatibility = JavaVersion.VERSION_17/g' app/build.gradle
          sed -i 's/targetCompatibility = JavaVersion.VERSION_21/targetCompatibility = JavaVersion.VERSION_17/g' app/build.gradle
          sed -i 's/JavaVersion.VERSION_21/JavaVersion.VERSION_17/g' app/build.gradle
          
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: R4-APK-File
          path: android/app/build/outputs/apk/debug/app-debug.apk
