name: R4_Final_Clean_Build
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create www directory
        run: |
          mkdir -p www
          cp index.html www/index.html

      - name: Install dependencies globally
        run: npm install -g @capacitor/cli

      - name: Create package.json
        run: npm init -y

      - name: Install Capacitor packages
        run: npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Initialize Capacitor
        run: npx cap init "R4App" "com.hussein.r4app" --web-dir www

      - name: Add Android platform
        run: npx cap add android

      - name: Clear Gradle cache completely
        run: |
          rm -rf ~/.gradle/caches
          rm -rf ~/.gradle/wrapper
          rm -rf android/.gradle
          rm -rf android/build
          rm -rf android/app/build

      - name: Fix Java version compatibility
        run: |
          cd android/app
          sed -i 's/VERSION_21/VERSION_17/g' build.gradle
          sed -i 's/compileSDK 34/compileSDK 33/g' build.gradle

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew clean assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: R4-APK-File
          path: android/app/build/outputs/apk/debug/app-debug.apk
