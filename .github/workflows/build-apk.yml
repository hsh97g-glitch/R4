name: R4_Final_Success
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fix Files and Folders
        run: |
          mkdir -p www
          # نقل أي ملف html موجود ليصبح الصفحة الرئيسية
          cp *.html www/index.html 2>/dev/null || echo "<html><body>R4 App</body></html>" > www/index.html
          cp *.css www/ 2>/dev/null || true
          cp *.js www/ 2>/dev/null || true

      - name: Fresh Build
        run: |
          npm init -y
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npx cap init "R4App" "com.hussein.r4app" --web-dir www
          npx cap add android
          # تعديل ملف build.gradle لإصلاح تضارب النسخ فوراً
          cd android
          sed -i 's/JavaVersion.VERSION_21/JavaVersion.VERSION_17/g' app/build.gradle
          sed -i 's/JavaVersion.VERSION_11/JavaVersion.VERSION_17/g' app/build.gradle
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: R4-Final-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
